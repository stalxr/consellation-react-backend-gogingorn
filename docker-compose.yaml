version: '3.8'

services:
  # PostgreSQL 15 - база данных для приложения
  postgres:
    image: postgres:15-alpine
    container_name: charity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: charity
    ports:
      - "5432:5432"
    volumes:
      # Сохраняем данные БД в локальной папке для персистентности
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

